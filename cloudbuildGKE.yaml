steps:

# Connect to GKE
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: gcloud
  args:
    - container
    - clusters
    - get-credentials
    - dentalk8scluster
    - --region
    - asia-south1

# Debug workspace
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: bash
  args:
    - -c
    - |
      echo "Listing files in workspace"
      ls -R

# Apply Kubernetes manifests
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: kubectl
  args:
    - apply
    - -f
    - Kubernetes/
    - -R

# Update backend image
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: kubectl
  args:
    - set
    - image
    - deployment/backend-deployment
    - python-backend=asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/backend:$SHORT_SHA

# Update frontend image
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: kubectl
  args:
    - set
    - image
    - deployment/frontend-deployment
    - node-frontend=asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/webapp:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
