# Connect to GKE cluster
steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - container
    - clusters
    - get-credentials
    - dentalk8scluster
    - --region
    - asia-south1

- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: bash
  args:
    - -c
    - |
      echo "Listing files in workspace"
      ls -R


- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  entrypoint: kubectl
  args:
    - apply
    - -f
    - kubernetes/  


# Update backend deployment image
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: kubectl
  args:
    - set
    - image
    - deployment/dental-backend
    - backend=asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/backend:$SHORT_SHA


# Update frontend deployment image
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: kubectl
  args:
    - set
    - image
    - deployment/dental-frontend
    - frontend=asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/webapp:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
