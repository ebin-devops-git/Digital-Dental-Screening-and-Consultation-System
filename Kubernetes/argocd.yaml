apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dental-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ebin-devops-git/Digital-Dental-Screening-and-Consultation-System
    targetRevision: HEAD
    path: Kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
