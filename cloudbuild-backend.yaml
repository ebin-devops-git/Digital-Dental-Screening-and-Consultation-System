steps:

# Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - '-t'
    - 'asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/backend:$SHORT_SHA'
    - './Backend'

# Push image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - 'asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/backend:$SHORT_SHA'



images:
- 'asia-south1-docker.pkg.dev/$PROJECT_ID/dental-repo/backend:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
